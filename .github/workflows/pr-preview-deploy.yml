name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        id: deploy
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          PREVIEW_URL="recipe-database-pr-${{ github.event.pull_request.number }}.surge.sh"
          surge ./site $PREVIEW_URL --token $SURGE_TOKEN
          echo "preview_url=https://$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '📦 PR Preview'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 📦 PR Preview

            Your preview site is ready!

            🔗 **Preview URL:** ${{ steps.deploy.outputs.preview_url }}

            <sub>This preview was built from commit ${{ github.event.pull_request.head.sha }}</sub>
